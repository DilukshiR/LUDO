<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LUDO Web UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>LUDO</h1>
      <div id="subtitle" class="subtitle">Connecting...</div>
    </div>
    <div class="right">
      <label class="small">Server</label>
      <input id="api" class="api" value="http://localhost:8080" />
      <button id="reconnect" class="btn">Reconnect</button>
    </div>
  </header>

  <main class="layout">
    <section class="boardCard">
      <canvas id="board" width="640" height="640"></canvas>
      <div class="hint">Tip: Use MOVE 0..3 (piece index). ROLL first.</div>
    </section>

    <aside class="panel">
      <section class="card">
        <h2>Controls</h2>
        <div class="row">
          <button class="btn primary" id="roll">ROLL</button>
          <button class="btn" id="pause">PAUSE</button>
          <button class="btn" id="resume">RESUME</button>
        </div>
        <div class="row">
          <input id="piece" type="number" min="0" max="3" value="0" />
          <button class="btn primary" id="move">MOVE</button>
        </div>
      </section>

      <section class="card">
        <h2>Game State</h2>
        <div id="state" class="mono small"></div>
      </section>

      <section class="card">
        <h2>Recent Actions</h2>
        <pre id="log" class="log">(no log yet)</pre>
      </section>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
