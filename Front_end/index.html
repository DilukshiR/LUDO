<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LUDO Web UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>LUDO</h1>
      <div id="subtitle" class="subtitle">Connecting...</div>
    </div>
    <div class="right">
      <label class="small">Server</label>
      <input id="api" class="api" value="http://localhost:8080" />
      <button id="reconnect" class="btn">Reconnect</button>
    </div>
  </header>

  <main class="layout">
    <section class="boardCard">
      <canvas id="board" width="540" height="540"></canvas>
      <div class="hint">Board view only. Use backend commands/API for control.</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
